version: "3.9"

# ===========================================================
#  Smart Health Care System – Docker Compose
#  Usage:
#    docker compose up --build        # start all services
#    docker compose up --build -d     # detached mode
#    docker compose down              # stop & remove containers
# ===========================================================

networks:
  healthcare-net:
    driver: bridge

services:

  # ── MongoDB (shared database) ─────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - healthcare-net

  # ── RabbitMQ (message broker) ───────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - healthcare-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Auth Service  (PORT 5001) ────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - ./services/auth-service/.env
    environment:
      PORT: 5001
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
    networks:
      - healthcare-net

  # ── Patient Service  (PORT 5002) ─────────────────────────
  patient-service:
    build:
      context: ./services/patient-service
      dockerfile: Dockerfile
    container_name: patient-service
    restart: unless-stopped
    env_file:
      - ./services/patient-service/.env
    environment:
      PORT: 5002
    ports:
      - "5002:5002"
    depends_on:
      - mongodb
    networks:
      - healthcare-net

  # ── Appointment Service  (PORT 5003) ─────────────────────
  appointment-service:
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile
    container_name: appointment-service
    restart: unless-stopped
    env_file:
      - ./services/appointment-service/.env
    environment:
      PORT: 5003
      AUTH_SERVICE_URL: http://auth-service:5001/api/auth
      DOCTOR_SERVICE_URL: http://doctor-service:5004/api/doctors
      PATIENT_SERVICE_URL: http://patient-service:5002/api/patients
      TELEMEDICINE_SERVICE_URL: http://telemedicine-service:5006/api/sessions
      NOTIFICATION_SERVICE_URL: http://notification-service:5005/api/notifications
    ports:
      - "5003:5003"
    depends_on:
      - auth-service
      - doctor-service
      - patient-service
      - mongodb
    networks:
      - healthcare-net

  # ── Doctor Service  (PORT 5004) ──────────────────────────
  doctor-service:
    build:
      context: ./services/doctor-service
      dockerfile: Dockerfile
    container_name: doctor-service
    restart: unless-stopped
    env_file:
      - ./services/doctor-service/.env
    environment:
      PORT: 5004
    ports:
      - "5004:5004"
    depends_on:
      - mongodb
    networks:
      - healthcare-net

  # ── Notification Service  (PORT 5005) ────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    env_file:
      - ./services/notification-service/.env
    environment:
      PORT: 5005
      RABBITMQ_URI: amqp://rabbitmq
    ports:
      - "5005:5005"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - healthcare-net

  # ── Telemedicine Service  (PORT 5006) ────────────────────
  telemedicine-service:
    build:
      context: ./services/telemedicine-service
      dockerfile: Dockerfile
    container_name: telemedicine-service
    restart: unless-stopped
    env_file:
      - ./services/telemedicine-service/.env
    environment:
      PORT: 5006
      RABBITMQ_URI: amqp://rabbitmq
    ports:
      - "5006:5006"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - healthcare-net

  # ── AI Symptom Service  (PORT 5007) ──────────────────────
  ai-symptom-service:
    build:
      context: ./services/ai-symptom-service
      dockerfile: Dockerfile
    container_name: ai-symptom-service
    restart: unless-stopped
    env_file:
      - ./services/ai-symptom-service/.env
    environment:
      PORT: 5007
    ports:
      - "5007:5007"
    depends_on:
      - mongodb
    networks:
      - healthcare-net

  # ── Payment Service  (PORT 5008) ─────────────────────────
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    env_file:
      - ./services/payment-service/.env
    environment:
      PORT: 5008
      APPOINTMENT_SERVICE_URL: http://appointment-service:5003
    ports:
      - "5008:5008"
    depends_on:
      - appointment-service
      - mongodb
    networks:
      - healthcare-net

  # ── Frontend  (PORT 80) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_BASE_URL: /api/auth
        VITE_PATIENT_BASE_URL: /api/patients
        VITE_DOCTOR_BASE_URL: /api/doctors
        VITE_APPOINTMENT_BASE_URL: /api/appointments
        VITE_TELEMEDICINE_BASE_URL: /api/sessions
        VITE_SYMPTOM_BASE_URL: /api/symptoms
        VITE_PAYMENT_BASE_URL: /api/payments
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - patient-service
      - appointment-service
      - doctor-service
      - notification-service
      - telemedicine-service
      - ai-symptom-service
      - payment-service
    networks:
      - healthcare-net

volumes:
  mongodb-data:
