# ===========================================================
#  Payment Service – Deployment + Service
# ===========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: healthcare
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: your-dockerhub-username/payment-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5008
          env:
            - name: PORT
              value: "5008"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: payment-mongo-uri
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: stripe-secret-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: stripe-webhook-secret
            - name: APPOINTMENT_SERVICE_URL
              value: http://appointment-service.healthcare.svc.cluster.local:5003
            - name: FRONTEND_URL
              value: http://frontend.healthcare.svc.cluster.local
          readinessProbe:
            httpGet:
              path: /health
              port: 5008
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5008
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: healthcare
spec:
  selector:
    app: payment-service
  ports:
    - port: 5008
      targetPort: 5008
