# ===========================================================
#  Healthcare Secrets – Example Template
#
#  Copy this file to secrets.yaml and fill in the real values:
#    cp secrets.example.yaml secrets.yaml
#
#  WARNING: Never commit secrets.yaml to version control.
# ===========================================================
apiVersion: v1
kind: Secret
metadata:
  name: healthcare-secrets
  namespace: healthcare
type: Opaque
stringData:
  # ── JWT ────────────────────────────────────────────────────
  jwt-secret: "CHANGE_ME_jwt_secret_key"

  # ── MongoDB connection strings (one per service) ──────────
  auth-mongo-uri: "mongodb+srv://<user>:<pass>@<cluster>/auth_db"
  patient-mongo-uri: "mongodb+srv://<user>:<pass>@<cluster>/patient_db"
  appointment-mongo-uri: "mongodb+srv://<user>:<pass>@<cluster>/appointment_db"
  doctor-mongo-uri: "mongodb+srv://<user>:<pass>@<cluster>/doctor_db"
  notification-mongo-uri: "mongodb+srv://<user>:<pass>@<cluster>/notification_db"
  telemedicine-mongo-uri: "mongodb+srv://<user>:<pass>@<cluster>/telemedicine_db"
  symptom-mongo-uri: "mongodb+srv://<user>:<pass>@<cluster>/symptom_db"
  payment-mongo-uri: "mongodb+srv://<user>:<pass>@<cluster>/payment_db"

  # ── Email (Gmail App Password recommended) ────────────────
  email-user: "your-email@gmail.com"
  email-pass: "your-gmail-app-password"

  # ── Stripe ────────────────────────────────────────────────
  stripe-secret-key: "sk_test_..."
  stripe-webhook-secret: "whsec_..."

  # ── RabbitMQ ──────────────────────────────────────────────
  rabbitmq-user: "healthcare_user"
  rabbitmq-pass: "CHANGE_ME_rabbitmq_password"
  rabbitmq-uri: "amqp://healthcare_user:CHANGE_ME_rabbitmq_password@rabbitmq.healthcare.svc.cluster.local:5672"

  # ── OpenAI ────────────────────────────────────────────────
  openai-api-key: "sk-..."
