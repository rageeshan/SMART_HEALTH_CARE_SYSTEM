# ===========================================================
#  Auth Service – Deployment + Service
#  Image: your-dockerhub-username/auth-service:latest
#  Replace the image name with your actual Docker Hub image.
# ===========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: healthcare
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: your-dockerhub-username/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: auth-mongo-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: jwt-secret
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: email-user
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: email-pass
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: healthcare
spec:
  selector:
    app: auth-service
  ports:
    - port: 5001
      targetPort: 5001
