# ===========================================================
#  AI Symptom Service – Deployment + Service
# ===========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
  namespace: healthcare
  labels:
    app: ai-symptom-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      containers:
        - name: ai-symptom-service
          image: ai-symptom-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5007
          env:
            - name: PORT
              value: "5007"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: symptom-mongo-uri
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: openai-api-key
          readinessProbe:
            httpGet:
              path: /health
              port: 5007
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5007
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-service
  namespace: healthcare
spec:
  selector:
    app: ai-symptom-service
  ports:
    - port: 5007
      targetPort: 5007
