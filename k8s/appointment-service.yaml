# ===========================================================
#  Appointment Service – Deployment + Service
# ===========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: healthcare
  labels:
    app: appointment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: appointment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              value: "5003"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: appointment-mongo-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: jwt-secret
            # Bases must match code: axios uses `${URL}/doctors`, `${URL}/user/...`, etc.
            - name: AUTH_SERVICE_URL
              value: http://auth-service.healthcare.svc.cluster.local:5001/api/auth
            - name: DOCTOR_SERVICE_URL
              value: http://doctor-service.healthcare.svc.cluster.local:5004/api/doctors
            - name: PATIENT_SERVICE_URL
              value: http://patient-service.healthcare.svc.cluster.local:5002/api/patients
            - name: TELEMEDICINE_SERVICE_URL
              value: http://telemedicine-service.healthcare.svc.cluster.local:5006/api/sessions
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service.healthcare.svc.cluster.local:5005/api/notifications
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: healthcare
spec:
  selector:
    app: appointment-service
  ports:
    - port: 5003
      targetPort: 5003
