apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-service
  labels:
    app: doctor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-service
  template:
    metadata:
      labels:
        app: doctor-service
    spec:
      containers:
      - name: doctor-service
        image: doctor-service:latest
        imagePullPolicy: Never # Adjust if pushing to a registry
        ports:
        - containerPort: 5003
        env:
        - name: PORT
          value: "5003"
        - name: MONGO_URI
          value: "mongodb://mongo-service:27017/healthcare_doctors"
        - name: JWT_SECRET
          value: "member1_secret_placeholder"
